<form id="registerForm">

    <input
        type="text"
        id="name"
        placeholder="Enter Name"
        required
    >

    <input
        type="email"
        id="email"
        placeholder="Enter Email"
        required
    >

    <input
        type="password"
        id="password"
        placeholder="Enter Password"
        required
    >

    <button type="submit">
        Register
    </button>

</form>

<script src="js/script.js"></script>
